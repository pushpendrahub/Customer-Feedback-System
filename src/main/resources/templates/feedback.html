<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Feedback</title>
    <meta charset="UTF-8">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f2f2f2;
        }

        .card {
            width: 450px;
            margin: 60px auto;
            padding: 25px;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0px 4px 12px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        .btn {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 2px solid #333;
            background: #e0e0e0;
            cursor: pointer;
            margin-bottom: 15px;
        }

        .btn:hover {
            background: #d5d5d5;
        }

        .feedback-box {
            border: 1px solid #ccc;
            border-radius: 6px;
            padding: 10px;
            margin-bottom: 10px;
            background: #fafafa;
        }

        .edit-btn {
            margin-top: 8px;
            padding: 5px 10px;
            border: none;
            border-radius: 5px;
            background: #007bff;
            color: white;
            cursor: pointer;
        }

        .edit-btn:hover {
            background: #0056b3;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>Feedback</h2>

    <!-- Add Feedback Button -->
    <button class="btn" type="button" onclick="window.location.href='/addFeedback'">
        Add Feedback
    </button>

    <!-- Feedback List -->
    <div th:if="${feedbackList != null}">
        <div th:each="fb : ${feedbackList}" class="feedback-box">

            <!-- Show Feedback -->
            <p th:text="${fb.message}">Feedback message</p>

            <!-- Edit Button -->
            <a th:href="@{/getFeedback/{id}(id=${fb.id})}" class="edit-btn">Edit</a>

        </div>
    </div>

    <!-- No Data -->
    <div th:if="${feedbackList == null or #lists.isEmpty(feedbackList)}">
        <p style="text-align:center;">No feedback available</p>
    </div>

</div>

</body>
</html>
