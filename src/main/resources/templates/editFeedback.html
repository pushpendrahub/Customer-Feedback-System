<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Feedback</title>
    <meta charset="UTF-8">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f2f2f2;
        }

        .card {
            width: 400px;
            margin: 80px auto;
            padding: 25px;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0px 4px 12px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        .btn-group {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .btn {
            width: 48%;
            padding: 10px;
            border-radius: 6px;
            border: 2px solid #333;
            background: #e0e0e0;
            cursor: pointer;
        }

        .btn:hover {
            background: #d5d5d5;
        }

        textarea {
            width: 100%;
            height: 120px;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            resize: none;
        }

        .submit-btn {
            width: 100%;
            margin-top: 20px;
            padding: 10px;
            border: none;
            border-radius: 6px;
            background: #ccc;
            cursor: pointer;
        }

        .submit-btn:hover {
            background: #b5b5b5;
        }

        label {
            font-size: 14px;
            display: block;
            margin-bottom: 5px;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>Add Feedback</h2>

    <form th:action="@{/editFeedback/{id}(id=${feedback.id})}" method="post">

        <label>Your Feedback:</label>
        <div th:if="${feedback!=null}">
            <textarea name="message" placeholder="Write your feedback here..." th:text="${feedback.message}" required></textarea>
        </div>
        <button type="submit" class="submit-btn">Submit</button>
    </form>

</div>

</body>
</html>
